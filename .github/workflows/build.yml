name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-2025
    
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed main.py

      - uses: actions/upload-artifact@v7
        with:
          name: pomodoro_app
          path: dist/main.exe