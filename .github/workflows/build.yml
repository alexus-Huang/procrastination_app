name: Build EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed main.py
      - uses: actions/upload-artifact@v4
        with:
          name: clicker_game
          path: dist/main.exe